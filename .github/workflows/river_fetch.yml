name: "River Fetcher — ArcGIS Gin River"

on:
  schedule:
    # Every hour at 30 minutes past (staggered from weather_fetch to avoid race conditions)
    - cron: "30 * * * *"
  workflow_dispatch:

jobs:
  fetch-river:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch river level data
        env:
          TZ: Asia/Colombo
        run: python river_fetcher.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "Update river data" || echo "No changes to commit"
          git push