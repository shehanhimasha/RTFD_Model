name: Run prediction pipeline

on:
  schedule:
    - cron: "45 * * * *" # runs every hour at :45 — after weather(:00) and river(:30) have fetched
  workflow_dispatch: # allows manual trigger from GitHub Actions tab

jobs:
  predict:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run prediction pipeline
        env:
          TZ: Asia/Colombo
          DOTNET_WEBHOOK_URL: ${{ secrets.DOTNET_WEBHOOK_URL }}
          DOTNET_PREDICTION_URL: ${{ secrets.DOTNET_PREDICTION_URL }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
        run: python -m src.pipeline.pipeline

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit prediction.json
        run: |
          git add data/prediction.json data/live/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update prediction data [skip ci]"
          git pull --rebase --autostash
          git push
