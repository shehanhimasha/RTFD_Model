name: Run prediction pipeline

on:
  schedule:
    - cron: "45 * * * *" # runs every hour at :45 — after weather(:00) and river(:30) have fetched
  workflow_dispatch: # allows manual trigger from GitHub Actions tab

jobs:
  predict:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run prediction pipeline
        run: python -m src.pipeline.pipeline

      - name: Commit prediction.json
        uses: EndBug/add-and-commit@v9
        with:
          add: "data/prediction.json data/live/"
          message: "Update prediction data [skip ci]"
          default_author: github_actions
          pull: "--rebase --autostash"
