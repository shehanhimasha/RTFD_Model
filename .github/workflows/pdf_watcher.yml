name: "PDF Watcher — DMC Rainfall Reports"

on:
  schedule:
    # Every 10 minutes
    - cron: "*/10 * * * *"
  # Allow manual trigger from the Actions UI
  workflow_dispatch:

jobs:
  fetch-dmc-pdf:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    permissions:
      contents: write   # needed to commit updated JSON back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run PDF watcher
        run: python pdf_watcher.py

      - name: Commit and push updated data
        uses: EndBug/add-and-commit@v9
        with:
          add: |
            data/dmc_data.json
            last_seen_pdf.txt
          message: "chore: auto-update dmc_data.json [skip ci]"
          default_author: github_actions
